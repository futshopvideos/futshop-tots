<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutShop TOTS - Em breve</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    .container { text-align: center; padding: 2rem; }
    .badge {
      display: inline-block;
      background: #f5a623;
      color: #000;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem; }
    h1 span { color: #f5a623; }
    p { font-size: 1.1rem; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Em breve</div>
    <h1>FutShop <span>TOTS</span></h1>
    <p>Algo incrível está chegando. Fique ligado!</p>
  </div>
</body>
</html>
